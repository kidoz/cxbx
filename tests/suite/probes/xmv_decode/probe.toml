# Requires XMV (Xbox Media Video) decode support. This Cxbx has no XMV OOVPA
# ("XMV 1.0.5933 Skipped"), so the capability is absent and the probe is skipped
# here; it documents the requirement and runs on a target that implements XMV.
tags = ["xmv", "xdk"]

[env]
CXBX_KERNEL_SKIP_INIT = "1"
CXBX_FS_SWAP = "1"
