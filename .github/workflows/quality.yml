name: quality

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-2025
    timeout-minutes: 30

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install pinned build tools
        run: python -m pip install --disable-pip-version-check meson==1.11.0 uv==0.11.29

      - name: Verify native toolchain
        run: |
          $requiredTools = @(
              'clang',
              'clang++',
              'clang-format',
              'clang-tidy',
              'git-clang-format',
              'llvm-dlltool',
              'llvm-lib',
              'llvm-rc',
              'ninja'
          )
          Get-Command $requiredTools -ErrorAction Stop | Select-Object Name, Source
          meson --version
          ninja --version
          clang --version

      - name: Select comparison base
        id: comparison
        env:
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PUSH_BASE: ${{ github.event.before }}
        run: |
          $baseRevision = $env:PR_BASE
          if ([string]::IsNullOrWhiteSpace($baseRevision)) {
              $baseRevision = $env:PUSH_BASE
          }
          if ([string]::IsNullOrWhiteSpace($baseRevision) -or $baseRevision -match '^0+$') {
              $baseRevision = 'HEAD^'
          }
          git rev-parse --verify "$baseRevision^{commit}"
          if ($LASTEXITCODE -ne 0) {
              throw "Unable to resolve comparison base $baseRevision"
          }
          "base_revision=$baseRevision" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Check changed C/C++ formatting
        env:
          BASE_REVISION: ${{ steps.comparison.outputs.base_revision }}
        run: |
          $formatDiff = & git clang-format --diff $env:BASE_REVISION HEAD
          if ($LASTEXITCODE -ne 0) {
              throw "git clang-format failed with exit code $LASTEXITCODE"
          }
          $formatText = $formatDiff -join [Environment]::NewLine
          if ($formatText) {
              Write-Output $formatText
          }
          if ($formatText -match '(?m)^diff --git ') {
              throw 'Changed C/C++ lines are not clang-formatted.'
          }

      - name: Configure canonical Win32 build
        run: meson setup build-quality --cross-file cross/i686-windows-clang.ini

      - name: Compile
        run: |
          $compileOutput = & meson compile -C build-quality 2>&1
          $compileExitCode = $LASTEXITCODE
          $compileOutput | ForEach-Object { Write-Output $_ }
          if ($compileExitCode -ne 0) {
              $diagnostics = $compileOutput |
                  Where-Object { "$_" -match '(?i)(FAILED:|fatal error:| error:|LNK\d{4}|undefined symbol)' } |
                  Select-Object -Last 20
              foreach ($diagnostic in $diagnostics) {
                  $message = "$diagnostic" -replace '%', '%25' -replace "`r", '%0D' -replace "`n", '%0A'
                  Write-Output "::error::$message"
              }
              throw "Meson compile failed with exit code $compileExitCode"
          }

      - name: Run host tests
        run: meson test -C build-quality --print-errorlogs --no-suite performance

      - name: Analyze changed C/C++ lines
        env:
          BASE_REVISION: ${{ steps.comparison.outputs.base_revision }}
        run: .github/scripts/clang_tidy_diff.ps1 -BuildDirectory build-quality -BaseRevision $env:BASE_REVISION

      - name: Lint Python developer tools
        run: |
          uv sync --locked --dev
          uv run ruff check tools/xtest

  native-x64-asan:
    name: Native x64 ASan (advisory)
    runs-on: windows-2025
    timeout-minutes: 20
    continue-on-error: true

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install pinned build tools
        run: python -m pip install --disable-pip-version-check meson==1.11.0

      - name: Run native x64 ASan lane
        env:
          ASAN_BUILD_DIR: ${{ runner.temp }}\cxbx-host-asan-build
          ASAN_DIAGNOSTICS_DIR: ${{ runner.temp }}\cxbx-host-asan-diagnostics
        run: |
          .github/scripts/run_native_asan.ps1 `
              -SourceDirectory . `
              -BuildDirectory $env:ASAN_BUILD_DIR `
              -DiagnosticsDirectory $env:ASAN_DIAGNOSTICS_DIR

      - name: Summarize advisory result
        if: always()
        run: |
          @(
              '### Native x64 ASan (advisory)',
              '',
              'This job is non-gating while hosted-runner repeatability is evaluated.',
              'Toolchain inventory and Meson diagnostics are retained as an artifact.'
          ) | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY

      - name: Retain ASan diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-x64-asan-diagnostics
          path: |
            ${{ runner.temp }}/cxbx-host-asan-diagnostics
            ${{ runner.temp }}/cxbx-host-asan-build/meson-logs
            ${{ runner.temp }}/cxbx-host-asan-build/meson-info
            ${{ runner.temp }}/cxbx-host-asan-build/compile_commands.json
          if-no-files-found: warn
          retention-days: 14
