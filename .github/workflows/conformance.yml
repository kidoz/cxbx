# Xbox conformance suite gate: build the emulator, build every probe XBE, run
# the full 17-probe suite, fail on any divergence.
#
# The gate needs the machine-local toolchain described in tools/xtest/README.md
# (meson/ninja + MSVC-compatible C++ for the emulator; MSYS2 make + clang + nxdk
# for the probe XBEs, with paths configured in tools/xtest/config.toml).
# GitHub-hosted runners do not have that toolchain, so this targets a
# self-hosted Windows runner labeled `cxbx-suite`. Register one with:
#   https://github.com/<owner>/<repo>/settings/actions/runners
name: conformance

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  suite:
    runs-on: [self-hosted, windows, cxbx-suite]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Conformance gate
        run: python tools/xtest/xtest.py gate

      - name: Publish JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-results
          path: tools/xtest/out/results.xml
