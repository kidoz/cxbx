# Meson cross file for building cxbx as 32-bit (Win32) with clang.
#
# The emulator and the bundled open-xdk/xlibc sources are 32-bit x86 code:
# size_t is hard-typedef'd to `unsigned int`, and routines such as
# xlibc/src/math/ftol.c use __declspec(naked) with x86 inline __asm{}.
# Neither is valid for a native x86_64 target, so an unqualified
# `meson setup` fails to compile. Point clang at the i686 MSVC triple to
# match the original MSVC/Win32 build.
#
# Usage:
#   meson setup build --cross-file cross/i686-windows-clang.ini
#   ninja -C build

[binaries]
# The --target is embedded in the compiler command so it applies to both the
# compile and (clang-driver) link steps.
c = ['clang', '--target=i686-pc-windows-msvc']
cpp = ['clang++', '--target=i686-pc-windows-msvc']
ar = 'llvm-lib'
rc = 'llvm-rc'

[host_machine]
system = 'windows'
cpu_family = 'x86'
cpu = 'i686'
endian = 'little'
